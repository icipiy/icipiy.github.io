<!DOCTYPE html>
<html>
<head>
  <title>FontFace</title>
  <style>
    @font-face {
      font-family: 'Local HuaWenXingKai';
      src: local('STXingkai');
    }
    .content {
      font-family: 'Local HuaWenXingKai', serif;
      font-size: 32px;
    }
  </style>
</head>
<body>
  <p class="content">这段文本使用自定义字体：华文行楷</p>
  <p class="content">font-family: 'Local HuaWenXingKai'</p>
  <p class="content">src: local('STXingkai')</p>
</body>
</html>
